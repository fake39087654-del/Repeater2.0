<!DOCTYPE html>
<html lang="zh">
<head>
<title>TextRepeater - 语言练习</title>
<style>body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px;}textarea{width:100%;height:200px;}</style>
</head>
<body>
<h1>Text Repeater</h1>
<p>粘贴或上传文档 → 重复朗读（语言学习）</p>
<textarea id="input" placeholder="粘贴文字或上传文档..."></textarea><br><br>
<input type="file" id="fileInput" accept=".txt,.md"><br><br>
<button onclick="repeat()">▶ 重复一次</button>
<button onclick="loop()">🔁 循环直到停止</button>
<button onclick="stop()">⏹ 停止</button>
<script>
let utterance, interval;
function repeat() {
  const text = document.getElementById('input').value.trim();
  if (!text) return;
  utterance = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(utterance);
}
function loop() {
  stop();
  const text = document.getElementById('input').value.trim();
  if (!text) return;
  interval = setInterval(() => { utterance = new SpeechSynthesisUtterance(text); speechSynthesis.speak(utterance); }, 2500);
}
function stop() {
  speechSynthesis.cancel();
  if (interval) clearInterval(interval);
}
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => document.getElementById('input').value = ev.target.result;
  reader.readAsText(file);
});
</script>
</body>
</html>
